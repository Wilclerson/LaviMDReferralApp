services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: lavimd
      POSTGRES_PASSWORD: lavimd
      POSTGRES_DB: lavimd
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lavimd -d lavimd"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: postgresql://lavimd:lavimd@postgres:5432/lavimd?schema=public
      # Development-only default. Provide a real secret via your deployment's
      # secret manager; never commit one.
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-at-least-32-chars}
      JWT_EXPIRES_IN: 1h
    ports:
      - "3000:3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
